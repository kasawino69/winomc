name: WinoMC Security Path Fix 1.6.1.2

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/winomc-security-path-fix-1612.yml'
      - '.github/winomc-security-path-fix-1612.trigger'

permissions:
  contents: write

jobs:
  apply-security-path-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply patch
        shell: bash
        run: |
          set -eu
          git apply --check .github/winomc-security-path-fix-1612.patch
          git apply .github/winomc-security-path-fix-1612.patch

      - name: Update metadata
        shell: python
        run: |
          from pathlib import Path
          config = Path('winomc-server-bedrock/config.yaml')
          text = config.read_text(encoding='utf-8')
          text = text.replace('version: 1.6.1.1', 'version: 1.6.1.2', 1)
          config.write_text(text, encoding='utf-8')
          changelog = Path('winomc-server-bedrock/CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          lines = [
              '### 1.6.1.2',
              '',
              '* CodeQL-Pfadwarnungen (`py/path-injection`) in der Web-Konsole gehärtet.',
              '* Pfadprüfung zentral auf `realpath` plus `commonpath` umgestellt.',
              '* Upload, JSON-Upload, Datei-Editor, ZIP-Export/Entpacken, Papierkorb und Download-Pfade prüfen Ziele vor Dateioperationen erneut gegen erlaubte WinoMC-Root-Verzeichnisse.',
              '* Add-on-Version auf 1.6.1.2 angehoben, damit Home Assistant die Sicherheitskorrektur als Update erkennt.',
              '',
              ''
          ]
          entry = '\n'.join(lines)
          if '### 1.6.1.2' not in text:
              text = text.replace('### 1.6.1.1\n', entry + '### 1.6.1.1\n', 1)
          changelog.write_text(text, encoding='utf-8')

      - name: Validate
        run: |
          python3 -m py_compile winomc-server-bedrock/rootfs/usr/local/bin/winomc-console-server

      - name: Commit result
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add winomc-server-bedrock/rootfs/usr/local/bin/winomc-console-server winomc-server-bedrock/config.yaml winomc-server-bedrock/CHANGELOG.md
          git commit -m "1.6.1.2"
          git push
