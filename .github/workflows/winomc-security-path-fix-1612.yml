name: WinoMC Security Path Fix 1.6.1.2

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/winomc-security-path-fix-1612.yml'

permissions:
  contents: write

jobs:
  apply-security-path-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply WinoMC 1.6.1.2 security hardening
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          repo = Path('.')
          console_path = repo / 'winomc-server-bedrock/rootfs/usr/local/bin/winomc-console-server'
          config_path = repo / 'winomc-server-bedrock/config.yaml'
          changelog_path = repo / 'winomc-server-bedrock/CHANGELOG.md'
          workflow_path = repo / '.github/workflows/winomc-security-path-fix-1612.yml'

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Missing expected block: {label}')
              return text.replace(old, new, 1)

          console = console_path.read_text(encoding='utf-8')

          console = replace_once(console,
          '''def is_inside_base(base_path, candidate_path):
              base_path = os.path.realpath(base_path)
              candidate_path = os.path.realpath(candidate_path)
              return candidate_path == base_path or candidate_path.startswith(base_path + os.sep)
          ''',
          '''def is_inside_base(base_path, candidate_path):
              base_path = os.path.realpath(base_path)
              candidate_path = os.path.realpath(candidate_path)
              try:
                  return os.path.commonpath([base_path, candidate_path]) == base_path
              except (OSError, ValueError):
                  return False
          ''', 'is_inside_base commonpath hardening')

          console = replace_once(console,
          '''def resolve_safe_path(root_key, rel_path="/"):
              if root_key not in FILE_ROOTS:
                  raise ValueError("Unbekannter Dateibereich.")
              rel_path = normalize_rel_path(rel_path)
              base_path = os.path.realpath(FILE_ROOTS[root_key]["path"])
              candidate_path = os.path.realpath(os.path.join(base_path, rel_path.lstrip("/")))
              if not is_inside_base(base_path, candidate_path):
                  raise ValueError("Pfad außerhalb des erlaubten Bereichs blockiert.")
              return candidate_path, rel_path
          ''',
          '''def resolve_safe_path(root_key, rel_path="/"):
              if root_key not in FILE_ROOTS:
                  raise ValueError("Unbekannter Dateibereich.")
              rel_path = normalize_rel_path(rel_path)
              base_path = os.path.realpath(FILE_ROOTS[root_key]["path"])
              candidate_path = os.path.realpath(os.path.join(base_path, rel_path.lstrip("/")))
              if not is_inside_base(base_path, candidate_path):
                  raise ValueError("Pfad außerhalb des erlaubten Bereichs blockiert.")
              return candidate_path, rel_path


          def assert_safe_path(root_key, candidate_path):
              if root_key not in FILE_ROOTS:
                  raise ValueError("Unbekannter Dateibereich.")
              base_path = os.path.realpath(FILE_ROOTS[root_key]["path"])
              candidate_path = os.path.realpath(candidate_path)
              if not is_inside_base(base_path, candidate_path):
                  raise ValueError("Pfad außerhalb des erlaubten Bereichs blockiert.")
              return candidate_path


          def assert_safe_internal_path(base_dir, candidate_path):
              base_path = os.path.realpath(base_dir)
              candidate_path = os.path.realpath(candidate_path)
              if not is_inside_base(base_path, candidate_path):
                  raise ValueError("Interner Pfad außerhalb des erlaubten Bereichs blockiert.")
              return candidate_path


          def assert_safe_download_path(candidate_path):
              candidate_path = os.path.realpath(candidate_path)
              allowed_bases = [os.path.realpath(info["path"]) for info in FILE_ROOTS.values()]
              allowed_bases.append(os.path.realpath(tempfile.gettempdir()))
              for base_path in allowed_bases:
                  if is_inside_base(base_path, candidate_path):
                      return candidate_path
              raise ValueError("Download-Pfad außerhalb der erlaubten Bereiche blockiert.")


          def open_safe(root_key, candidate_path, mode, *args, **kwargs):
              safe_path = assert_safe_path(root_key, candidate_path)
              return open(safe_path, mode, *args, **kwargs)


          def open_safe_internal(base_dir, candidate_path, mode, *args, **kwargs):
              safe_path = assert_safe_internal_path(base_dir, candidate_path)
              return open(safe_path, mode, *args, **kwargs)


          def replace_safe(root_key, source_path, target_path):
              safe_source = assert_safe_path(root_key, source_path)
              safe_target = assert_safe_path(root_key, target_path)
              os.replace(safe_source, safe_target)


          def remove_safe(root_key, candidate_path):
              safe_path = assert_safe_path(root_key, candidate_path)
              if os.path.isdir(safe_path) and not os.path.islink(safe_path):
                  shutil.rmtree(safe_path)
              else:
                  os.remove(safe_path)


          def remove_safe_internal(base_dir, candidate_path):
              safe_path = assert_safe_internal_path(base_dir, candidate_path)
              if os.path.isdir(safe_path) and not os.path.islink(safe_path):
                  shutil.rmtree(safe_path)
              else:
                  os.remove(safe_path)
          ''', 'safe path helpers')

          console = replace_once(console,
          '''def make_file_backup(file_path, root_key, rel_path):
              if not os.path.exists(file_path) or not os.path.isfile(file_path):
                  return None
              os.makedirs(FILE_BACKUP_DIR, exist_ok=True)
              timestamp = time.strftime("%Y-%m-%d_%H-%M-%S")
              rel_name = normalize_rel_path(rel_path).replace("/", "__")
              backup_name = safe_download_name("%s-%s-%s" % (timestamp, root_key, rel_name), "winomc-file-backup")
              backup_path = os.path.join(FILE_BACKUP_DIR, backup_name)
              if os.path.exists(backup_path):
                  backup_path += ".bak"
              shutil.copy2(file_path, backup_path)
              return backup_path
          ''',
